<form method="post" action="{{ action }}">
  {% if past and _method == 'put' %}
    <input type="hidden" name="_method" value="PUT">
  {% endif %}
  <div class="field">
    <label for="name">name</label>
    <input type="text" id="name" name="name" value="{{ past.name if past else '' }}">
  </div>
  <div class="field">
    <label for="content">content</label>
    <textarea id="content" name="content">{{ past.content if past else '' }}</textarea>
  </div>
  <div class="actions-row">
    <input type="submit" value="{{ submit_label or 'save' }}">
  </div>
</form>
